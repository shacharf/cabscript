  cabinet:
    default_depth: 580
  clearances:
    side_each: 8
    top: 10
    back: 0
    door_gap: 3
  fillers:
    side: auto
    top: auto
  carcass:
    top_panel: true
    bottom_panel: true
    back_panel: true
